name: Tests

on:
  push:
  pull_request:

jobs:
  c-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build
        run: make

      - name: Test
        run: make test
