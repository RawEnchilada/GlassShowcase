    <section class="intro-section">
      <div class="intro-copy">
        <h1>Project Gallery</h1>
        <p>
          Take a look at our projects in various states and rate your favourites! Some are just tech demos, some offer actual gameplay, some are completely finished games!
          Rating will help us see which projects are worth pursuing.
        </p>
        <a class="intro-link" href="#exhibition">Enter the archive</a>
      </div>
      <div class="intro-wordmark" aria-hidden="true">
        <span>Glass</span>
        <span>Tower</span>
      </div>
    </section>

    <section class="exhibit-section" id="exhibition" aria-label="Glass Tower exhibition">
      <main class="page-shell">
        <div id="swipe-indicator"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-left"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Swipe <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-right"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></div>
        <section class="project-list" id="projectList" aria-label="Archived games"></section>
      </main>
    </section>

    <template id="cardTemplate">
      <article class="project-card">
        <figure class="project-media" hidden>
          <img class="project-media-backdrop" alt="" aria-hidden="true">
          <img alt="">
        </figure>
        <div class="card-topline">
          <span class="status-badge"></span>
          <a class="download-link" href="#" download>Download</a>
        </div>
        <h2></h2>
        <p class="project-description"></p>
        <div class="rating-row" aria-label="Rating">
          <button class="rating-button like" type="button" data-rating="like" aria-label="Like this project">
            <span aria-hidden="true">Like</span>
            <strong data-count="likes">0</strong>
          </button>
          <button class="rating-button dislike" type="button" data-rating="dislike" aria-label="Dislike this project">
            <span aria-hidden="true">Dislike</span>
            <strong data-count="dislikes">0</strong>
          </button>
        </div>
        <p class="rating-feedback" role="status" aria-live="polite"></p>
      </article>
    </template>
